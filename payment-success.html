<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Pembayaran Berhasil — Pinkz Gamez</title>
  <link rel="stylesheet" href="css/main.css"/>
  <style>
    .wrap{ min-height:100vh; display:flex; align-items:center; justify-content:center; padding:1.5rem; }
    .card{ width:100%; max-width:480px; background:var(--card); border:1px solid rgba(236,72,153,.2); border-radius:var(--r2); padding:2rem; text-align:center; box-shadow:var(--glow-pink); }
    .ico{ font-size:4rem; margin-bottom:1rem; animation:pop .4s ease; }
    @keyframes pop{ 0%{transform:scale(.5);opacity:0} 80%{transform:scale(1.1)} 100%{transform:scale(1);opacity:1} }
    .title{ font-size:1.3rem; font-weight:900; margin-bottom:.3rem; color:var(--green); }
    .sub{ color:var(--text2); font-size:.87rem; margin-bottom:1.5rem; }
    .detail{ background:var(--card2); border:1px solid var(--border); border-radius:var(--r); padding:1rem; text-align:left; margin-bottom:1.2rem; }
    .dr{ display:flex; justify-content:space-between; font-size:.82rem; padding:4px 0; }
    .dl{ color:var(--text2); }
    .dv{ font-weight:600; }
    .struk-wrap{ background:#fff; color:#111; border-radius:var(--r); padding:1rem; font-family:monospace; font-size:.72rem; line-height:1.8; white-space:pre-wrap; text-align:left; margin-bottom:1.2rem; max-height:320px; overflow-y:auto; }
    .actions{ display:flex; flex-direction:column; gap:.6rem; }
  </style>
</head>
<body>
<nav class="pub-nav">
  <div class="pub-brand">
    <div class="pub-brand-ico">🎮</div>
    <span class="pub-brand-name">Pinkz Gamez</span>
  </div>
</nav>

<div class="wrap">
  <div class="card">
    <div class="ico">✅</div>
    <div class="title">Pembayaran Berhasil!</div>
    <div class="sub">Booking kamu sudah dikonfirmasi. Selamat main!</div>

    <div class="detail" id="detail" style="display:none">
      <div class="dr"><span class="dl">ID Booking</span><span class="dv" id="d-id">—</span></div>
      <div class="dr"><span class="dl">Nama</span><span class="dv" id="d-nama">—</span></div>
      <div class="dr"><span class="dl">Unit</span><span class="dv" id="d-unit">—</span></div>
      <div class="dr"><span class="dl">Tanggal</span><span class="dv" id="d-tgl">—</span></div>
      <div class="dr"><span class="dl">Waktu</span><span class="dv" id="d-time">—</span></div>
      <div class="dr" style="border-top:1px solid var(--border);padding-top:8px;margin-top:4px">
        <span class="dl">Total</span>
        <span class="dv" style="color:var(--pink-l);font-size:1rem" id="d-total">—</span>
      </div>
    </div>

    <div id="struk-loading" style="color:var(--text3);font-size:.82rem;margin-bottom:1rem">⏳ Memuat struk...</div>
    <div class="struk-wrap" id="struk-box" style="display:none"></div>

    <div class="actions">
      <button class="btn btn-ghost btn-full btn-pill" id="btn-print" style="display:none">🖨️ Cetak Struk</button>
      <a href="cek-booking.html" class="btn btn-ghost btn-full btn-pill">📋 Cek Booking Lainnya</a>
      <a href="index.html" class="btn btn-ghost btn-full btn-pill">🏠 Kembali ke Beranda</a>
    </div>
  </div>
</div>

<div id="toast"></div>
<script src="js/app.js"></script>
<script>
(async () => {
  const params = new URLSearchParams(location.search);
  const bookingId = params.get('id');

  if (!bookingId) { location.href = 'index.html'; return; }

  // Fetch booking dari server
  let bk = null;
  let attempts = 0;
  while (!bk && attempts < 5) {
    try {
      const d = await apiAsync('GET', '/api/bookings/' + encodeURIComponent(bookingId));
      bk = d?.booking;
    } catch {}
    if (!bk) await new Promise(r => setTimeout(r, 1000));
    attempts++;
  }

  if (!bk) {
    document.getElementById('struk-loading').textContent = '⚠️ Booking tidak ditemukan.';
    return;
  }

  // Isi detail
  const unitNama  = bk.unitNama  || bk.unit_nama  || '—';
  const tglStr    = bk.tglStr    || bk.tgl_str    || bk.tgl || '';
  const timeRange = bk.timeRange || bk.time_range || '—';
  document.getElementById('detail').style.display = 'block';
  document.getElementById('d-id').textContent    = bk.id;
  document.getElementById('d-nama').textContent  = bk.nama;
  document.getElementById('d-unit').textContent  = unitNama;
  document.getElementById('d-tgl').textContent   = tglStr;
  document.getElementById('d-time').textContent  = timeRange;
  document.getElementById('d-total').textContent = Rp(bk.total);

  // Fetch struk dari server
  const struk = await getStruk(bookingId);
  document.getElementById('struk-loading').style.display = 'none';

  if (struk) {
    document.getElementById('struk-box').textContent = struk;
    document.getElementById('struk-box').style.display = 'block';
    document.getElementById('btn-print').style.display = 'flex';
    document.getElementById('btn-print').addEventListener('click', () => window.print());
  } else {
    document.getElementById('struk-loading').textContent = 'Struk belum tersedia — admin belum ACC.';
    document.getElementById('struk-loading').style.display = 'block';
  }
})();
</script>
</body>
</html>
