<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Pinkz Gamez</title>
  <link rel="stylesheet" href="css/main.css"/>
  <style>
    .info-wrap{ min-height:100vh; display:flex; align-items:center; justify-content:center; padding:1.5rem; }
    .info-card{ width:100%; max-width:420px; background:var(--card); border:1px solid var(--border); border-radius:var(--r2); padding:2.2rem; text-align:center; }
    .info-ico{ font-size:3rem; margin-bottom:1rem; }
    .info-title{ font-size:1.2rem; font-weight:800; margin-bottom:.5rem; }
    .info-sub{ color:var(--text2); font-size:.87rem; margin-bottom:1.5rem; line-height:1.6; }
  </style>
</head>
<body>
<div class="info-wrap">
  <div class="info-card">
    <div class="info-ico">🎮</div>
    <div class="info-title">Tidak Perlu Login!</div>
    <div class="info-sub">
      Pinkz Gamez tidak memerlukan akun pelanggan.<br>
      Kamu bisa langsung booking tanpa daftar atau login.
    </div>
    <a href="booking.html" class="btn btn-primary btn-full btn-pill" style="margin-bottom:.7rem">
      🎮 Booking Sekarang
    </a>
    <a href="cek-booking.html" class="btn btn-ghost btn-full btn-pill" style="margin-bottom:.7rem">
      📋 Cek Status Booking
    </a>
    <a href="index.html" class="btn btn-ghost btn-full btn-pill">
      🏠 Kembali ke Beranda
    </a>
    <div style="margin-top:1.5rem;padding-top:1rem;border-top:1px solid var(--border);font-size:.78rem;color:var(--text3)">
      Admin/Staff? <a href="admin/login.html" style="color:var(--pink-l)">Login Admin →</a>
    </div>
  </div>
</div>
<script src="js/app.js"></script>
</body>
</html>
