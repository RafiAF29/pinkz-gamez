<!DOCTYPE html>
<html lang="id">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>Laporan — Pinkz Gamez Boss</title><link rel="stylesheet" href="../css/main.css"/><style>.bcc{display:flex;align-items:flex-end;gap:5px;height:110px;margin-top:.5rem}.bcc-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px}.bcc-f{width:100%;border-radius:3px 3px 0 0;min-height:4px;background:linear-gradient(180deg,var(--pink-l),#7c3aed)}.bcc-l{font-size:.6rem;color:var(--text3)}</style></head>
<body>
<div id="sb-ov" class="sb-overlay"></div>
<div class="layout">
  <aside class="sidebar" id="sidebar"><div class="sb-header"><div class="sb-logo"><svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/></svg></div><div class="sb-brand">Pinkz Gamez<br>Boss</div></div><nav class="sb-nav" id="sb-nav"></nav><div class="sb-footer"><a href="../admin/login.html" onclick="doLogout()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg> Log Out</a></div></aside>
  <div class="main">
    <div class="topbar"><div class="tb-title"><h1>Laporan Penjualan</h1><p>Hanya transaksi status PAID</p></div><div class="tb-right"><div class="tb-user"><span class="tb-name" id="tb-name">—</span><span class="tb-role-badge boss" id="tb-role-badge">Boss</span><div class="tb-avatar" id="tb-avatar">?</div></div><button class="mob-btn" id="mob-btn"><svg width="22" height="22" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg></button><button class="btn btn-ghost btn-sm" onclick="exportCSV()">📥 CSV</button></div></div>
    <div class="page">
      <div class="stats" style="margin-bottom:1.4rem">
        <div class="stat"><div class="stat-label">Total Pendapatan</div><div class="stat-value" id="rt" style="font-size:1.3rem;color:var(--pink-l)">Rp 0</div></div>
        <div class="stat"><div class="stat-label">Transaksi</div><div class="stat-value" id="rx">0</div></div>
        <div class="stat"><div class="stat-label">Sewa PS</div><div class="stat-value" id="rp" style="font-size:1rem">Rp 0</div></div>
        <div class="stat"><div class="stat-label">F&amp;B</div><div class="stat-value" id="rf" style="font-size:1rem;color:var(--orange)">Rp 0</div></div>
      </div>
      <div class="lap-grid" style="margin-bottom:1.3rem">
        <div class="lap-card"><h3>📈 7 Hari Terakhir</h3><div class="bcc" id="bcc"></div></div>
        <div class="lap-card"><h3>🏆 Unit Terlaris</h3><div id="top-u"></div></div>
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.7rem;flex-wrap:wrap;gap:.5rem">
        <div style="font-size:.86rem;font-weight:700">📋 Detail Transaksi</div>
        <div class="search-bar" style="max-width:240px"><span class="s-ico"><svg width="15" height="15" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35" stroke-linecap="round"/></svg></span><input type="text" placeholder="Cari..." id="q" oninput="rT()"/></div>
      </div>
      <div class="tbl-wrap"><table><thead><tr><th>ID Transaksi</th><th>Booking</th><th>Pelanggan</th><th>Unit</th><th>Tanggal</th><th>Sewa PS</th><th>F&amp;B</th><th>Total</th></tr></thead><tbody id="tbody"></tbody></table></div>
    </div>
  </div>
</div>
<div id="toast"></div>
<script src="../js/app.js"></script>
<script>
(async () => {
  let s;
  if (typeof requireAdminAsync === 'function' && API_ENABLED) {
    s = await requireAdminAsync();
    if (!s) return;
  } else {
    s = requireAdmin();
    if (!s) return;
  }
  if (s.role !== 'boss') { location.href='../admin/dashboard.html'; return; }
  fillAdminUser(s); buildSidebar(s.role,'bos/laporan.html'); initMobSidebar();
  const DAY=['Min','Sen','Sel','Rab','Kam','Jum','Sab'];
  async function render(){
    await fetchState();
    const lap=getLaporan();
    document.getElementById('rt').textContent=Rp(lap.reduce((s,l)=>s+l.total,0));
    document.getElementById('rx').textContent=lap.length;
    document.getElementById('rp').textContent=Rp(lap.reduce((s,l)=>s+(l.total_ps||0),0));
    document.getElementById('rf').textContent=Rp(lap.reduce((s,l)=>s+(l.total_fnb||0),0));
    // Bar chart
    const days=[]; for(let i=6;i>=0;i--){ const d=new Date(); d.setDate(d.getDate()-i); days.push(d.toISOString().split('T')[0]); }
    const dR=days.map(d=>lap.filter(l=>l.tgl===d).reduce((s,l)=>s+l.total,0)), maxR=Math.max(...dR,1);
    document.getElementById('bcc').innerHTML=days.map((d,i)=>{ const dt=new Date(d+'T00:00:00'); return `<div class="bcc-col"><div class="bcc-f" style="height:${Math.max(4,Math.round((dR[i]/maxR)*100))}px"></div><div class="bcc-l">${DAY[dt.getDay()]}</div></div>`; }).join('');
    // Top units
    const uc={}, ur={}; lap.forEach(l=>{ uc[l.unit]=(uc[l.unit]||0)+1; ur[l.unit]=(ur[l.unit]||0)+l.total; });
    const medals=['🥇','🥈','🥉','4️⃣','5️⃣'];
    document.getElementById('top-u').innerHTML=Object.entries(uc).sort((a,b)=>b[1]-a[1]).slice(0,5).map(([u,c],i)=>`<div class="lap-row"><span class="lr-l">${medals[i]||''} ${u}</span><span class="lr-v" style="text-align:right"><span>${c}x</span> <span style="font-size:.7rem;color:var(--pink-l)">${Rp(ur[u])}</span></span></div>`).join('')||'<div style="color:var(--text3);font-size:.8rem">Belum ada data</div>';
    rT();
  }
  function rT(){
    const q=document.getElementById('q').value.toLowerCase(), lap=getLaporan().filter(l=>!q||l.nama?.toLowerCase().includes(q)||l.id?.toLowerCase().includes(q));
    document.getElementById('tbody').innerHTML=lap.length?lap.map(l=>`<tr><td style="font-size:.76rem"><b>${l.id}</b></td><td style="font-size:.76rem">${l.booking_id}</td><td>${l.nama}</td><td style="font-size:.78rem">${l.unit||'—'}</td><td style="font-size:.76rem">${l.tgl}</td><td>${Rp(l.total_ps||0)}</td><td style="color:${(l.total_fnb||0)>0?'var(--orange)':'var(--text3)'}">${Rp(l.total_fnb||0)}</td><td><b style="color:var(--pink-l)">${Rp(l.total)}</b></td></tr>`).join(''):`<tr><td colspan="8" style="text-align:center;padding:2rem;color:var(--text3)">Belum ada transaksi paid</td></tr>`;
  }
  function exportCSV(){ const lap=getLaporan(); if(!lap.length){ toast('Belum ada data'); return; } const h='ID,Booking ID,Nama,Unit,Tanggal,Sewa PS,FnB,Total\n', r=lap.map(l=>`${l.id},${l.booking_id},${l.nama},"${l.unit||''}",${l.tgl},${l.total_ps||0},${l.total_fnb||0},${l.total}`).join('\n'); const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([h+r],{type:'text/csv'})); a.download='laporan-spacex-'+today()+'.csv'; a.click(); toast('📥 CSV diunduh!'); }
  render();
})();
</script>
</body>
</html>
