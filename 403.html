<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>403 — Akses Ditolak</title>
  <link rel="stylesheet" href="css/main.css"/>
  <style>
    .err-wrap{ min-height:100vh; display:flex; align-items:center; justify-content:center; padding:2rem; }
    .err-card{ text-align:center; max-width:440px; }
    .err-code{ font-family:var(--pixel); font-size:2.5rem; color:var(--red); margin-bottom:.5rem; }
    .err-title{ font-size:1.3rem; font-weight:800; margin-bottom:.5rem; }
    .err-desc{ color:var(--text2); font-size:.88rem; line-height:1.7; margin-bottom:1.8rem; }
    .err-icon{ font-size:4rem; margin-bottom:1rem; }
  </style>
</head>
<body>
<div class="err-wrap">
  <div class="err-card">
    <div class="err-icon">🚫</div>
    <div class="err-code">403</div>
    <h1 class="err-title">Akses Ditolak</h1>
    <p class="err-desc">
      Kamu tidak memiliki izin untuk mengakses halaman ini.<br>
      Silakan login dengan akun yang sesuai.
    </p>
    <div style="display:flex;gap:.8rem;justify-content:center;flex-wrap:wrap">
      <a href="/" class="btn btn-ghost btn-pill">🏠 Beranda</a>
      <a href="/login.html" class="btn btn-primary btn-pill">🔑 Login</a>
    </div>
  </div>
</div>
</body>
</html>
