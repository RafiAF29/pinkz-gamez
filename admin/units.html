<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Kelola Unit — Pinkz Gamez Admin</title>
  <link rel="stylesheet" href="../css/main.css"/>
  <style>
    .unit-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:1.2rem;position:relative;transition:border-color .2s}
    .unit-card:hover{border-color:rgba(236,72,153,.3)}
    .unit-card.maint{border-color:rgba(239,68,68,.25);background:rgba(239,68,68,.03)}
    .uc-ico{font-size:2rem;display:block;text-align:center;margin-bottom:.5rem}
    .uc-name{font-weight:700;font-size:.88rem;text-align:center;margin-bottom:2px}
    .uc-cat{font-size:.68rem;color:var(--text3);text-align:center;margin-bottom:.4rem;text-transform:uppercase;letter-spacing:.5px}
    .uc-price{font-size:.9rem;font-weight:700;text-align:center;color:var(--pink-l);margin-bottom:.5rem}
    .uc-status{text-align:center;margin-bottom:.9rem}
    .uc-badge-avail{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:.68rem;font-weight:700;background:rgba(34,197,94,.12);color:var(--green);border:1px solid rgba(34,197,94,.25)}
    .uc-badge-maint{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:.68rem;font-weight:700;background:rgba(239,68,68,.12);color:var(--red);border:1px solid rgba(239,68,68,.25)}
    .uc-badge-booked{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:.68rem;font-weight:700;background:rgba(236,72,153,.12);color:var(--pink-l);border:1px solid rgba(236,72,153,.25)}
    .uc-slot-info{font-size:.68rem;color:var(--text3);text-align:center;margin-bottom:.9rem}
    .uc-actions{display:flex;gap:.4rem}
  </style>
</head>
<body>
<div id="sb-ov" class="sb-overlay"></div>
<div class="layout">
  <aside class="sidebar">
    <div class="sb-header"><div class="sb-logo"><svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/></svg></div><div class="sb-brand">Pinkz Gamez<br>Admin</div></div>
    <nav class="sb-nav" id="sb-nav"></nav>
    <div class="sb-footer"><a href="login.html" id="btn-logout">↩ Log Out</a></div>
  </aside>
  <div class="main">
    <div class="topbar">
      <div class="tb-title"><h1>Kelola Unit</h1><p>Status, maintenance, dan harga setiap unit rental</p></div>
      <div class="tb-right"><div class="tb-user"><span class="tb-name" id="tb-name">—</span><span class="tb-role-badge" id="tb-role-badge">Staff</span><div class="tb-avatar" id="tb-avatar">?</div></div><button class="mob-btn" id="mob-btn"><svg width="22" height="22" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg></button></div>
    </div>
    <div class="page">
      <div class="stats" style="margin-bottom:1.4rem">
        <div class="stat"><div class="stat-label">Total Unit</div><div class="stat-value" id="st-tot">0</div></div>
        <div class="stat"><div class="stat-label">Tersedia</div><div class="stat-value" id="st-av" style="color:var(--green)">0</div></div>
        <div class="stat"><div class="stat-label">Maintenance</div><div class="stat-value" id="st-mn" style="color:var(--red)">0</div></div>
        <div class="stat"><div class="stat-label">Aktif Disewa</div><div class="stat-value" id="st-bk" style="color:var(--pink-l)">0</div></div>
      </div>
      <div class="filter-tabs" id="filter-tabs">
        <button class="ftab on" data-f="SEMUA">Semua</button>
        <button class="ftab" data-f="PS4">🎮 PS4 (Lt.1)</button>
        <button class="ftab" data-f="PS5">🕹️ PS5 (Lt.2)</button>
      </div>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:1rem" id="unit-grid"></div>
    </div>
  </div>
</div>

<!-- EDIT MODAL -->
<div class="modal-bg" id="m-edit">
  <div class="modal" style="max-width:420px">
    <button class="modal-x" id="btn-close-edit">✕</button>
    <div class="modal-title">✏️ Edit Unit</div>
    <input type="hidden" id="e-id"/>
    <div class="fg"><label>Nama Unit</label><input id="e-nama" placeholder="Nama unit..."/></div>
    <div class="fg">
      <label>Status Unit</label>
      <select id="e-status">
        <option value="available">✅ Available</option>
        <option value="maintenance">🔧 Maintenance</option>
      </select>
    </div>
    <button class="btn btn-primary btn-full" id="btn-save-edit">✅ Simpan Perubahan</button>
  </div>
</div>

<div id="toast"></div>
<script src="../js/app.js"></script>
<script>
/* ── state ── */
let curF = 'SEMUA';
let _units = [];

/* ── init ── */
(async () => {
  const s = await requireAdminAsync(); if (!s) return;
  fillAdminUser(s); buildSidebar(s.role, 'units.html'); initMobSidebar();
  document.getElementById('btn-logout').onclick = e => { e.preventDefault(); doLogout(); };
  await render();
  setInterval(render, 10000);
})();

/* ── filter tabs ── */
document.getElementById('filter-tabs').addEventListener('click', e => {
  const btn = e.target.closest('.ftab'); if (!btn) return;
  document.querySelectorAll('.ftab').forEach(t => t.classList.remove('on'));
  btn.classList.add('on'); curF = btn.dataset.f; renderGrid();
});

/* ── unit grid event delegation ── */
document.getElementById('unit-grid').addEventListener('click', e => {
  const editBtn  = e.target.closest('[data-edit]');
  const maintBtn = e.target.closest('[data-maint]');
  if (editBtn)  openEdit(editBtn.dataset.edit);
  if (maintBtn) toggleMaint(maintBtn.dataset.maint);
});

/* ── modal ── */
document.getElementById('btn-close-edit').addEventListener('click', () => closeM('m-edit'));
document.getElementById('btn-save-edit').addEventListener('click', saveEdit);

/* ── functions ── */
async function render() {
  try {
    const data = await apiAsync('GET', '/api/units');
    _units = data.units || [];
    localStorage.setItem('sx_units', JSON.stringify(_units));
  } catch { _units = getUnits(); }
  renderGrid();
}

function renderGrid() {
  const td = today();
  const filtered = curF === 'SEMUA' ? _units : _units.filter(u => u.kategori === curF);
  document.getElementById('st-tot').textContent = _units.length;
  document.getElementById('st-av').textContent  = _units.filter(u => u.status_unit === 'available').length;
  document.getElementById('st-mn').textContent  = _units.filter(u => u.status_unit === 'maintenance').length;
  const bkToday = _units.filter(u => {
    const b = getBookedSlots(); const p = getPendingSlots();
    return ((b[u.id]?.[td]||[]).length + (p[u.id]?.[td]||[]).length) > 0;
  }).length;
  document.getElementById('st-bk').textContent = bkToday;

  document.getElementById('unit-grid').innerHTML = filtered.map(u => {
    const meta     = UNIT_META[u.kategori] || { icon:'🎮' };
    const isMaint  = u.status_unit === 'maintenance';
    const b        = getBookedSlots(); const p = getPendingSlots();
    const bookedSl = new Set([...(b[u.id]?.[td]||[]), ...(p[u.id]?.[td]||[])]).size;
    const pct      = Math.round((bookedSl / ALL_SLOTS.length) * 100);
    let badge = '';
    if (isMaint)       badge = '<div class="uc-badge-maint">🔧 Maintenance</div>';
    else if (bookedSl) badge = `<div class="uc-badge-booked">🎮 ${bookedSl} slot terisi</div>`;
    else               badge = '<div class="uc-badge-avail">✅ Tersedia</div>';
    return `<div class="unit-card ${isMaint?'maint':''}">
      <span class="uc-ico">${meta.icon}</span>
      <div class="uc-name">${esc(u.nama)}</div>
      <div class="uc-cat">${esc(u.kategori)}</div>
      <div class="uc-price">${Rp(getHarga(u, td))}/jam</div>
      <div class="uc-status">${badge}</div>
      ${!isMaint && bookedSl ? `<div class="uc-slot-info">
        <div style="height:4px;background:rgba(255,255,255,.06);border-radius:2px;margin:0 0 3px">
          <div style="height:4px;background:${pct>70?'var(--red)':'var(--pink-l)'};border-radius:2px;width:${pct}%"></div>
        </div>${bookedSl}/${ALL_SLOTS.length} slot hari ini</div>` : ''}
      <div class="uc-actions">
        <button class="btn btn-ghost btn-sm" style="flex:1" data-edit="${esc(u.id)}">✏️ Edit</button>
        <button class="btn btn-sm ${isMaint?'btn-success':'btn-danger'}" data-maint="${esc(u.id)}">
          ${isMaint ? '✅ Aktifkan' : '🔧 Maintenance'}
        </button>
      </div>
    </div>`;
  }).join('');
}

function openEdit(id) {
  const u = _units.find(x => x.id === id); if (!u) return;
  document.getElementById('e-id').value     = id;
  document.getElementById('e-nama').value   = u.nama;
  document.getElementById('e-status').value = u.status_unit;
  openM('m-edit');
}

async function saveEdit() {
  const id     = document.getElementById('e-id').value;
  const nama   = document.getElementById('e-nama').value.trim();
  const status = document.getElementById('e-status').value;
  if (!nama) { toast('Isi nama unit!', 'warning'); return; }
  const btn = document.getElementById('btn-save-edit');
  btn.disabled = true; btn.textContent = '⏳ Menyimpan...';
  try {
    await apiAsync('PUT', '/api/units/' + encodeURIComponent(id), { nama, status_unit: status });
    closeM('m-edit'); toast('✅ Unit diperbarui!', 'success'); await render();
  } catch(e) { toast('❌ ' + e.message, 'error'); }
  finally { btn.disabled = false; btn.textContent = '✅ Simpan Perubahan'; }
}

async function toggleMaint(id) {
  const u = _units.find(x => x.id === id); if (!u) return;
  const newStatus = u.status_unit === 'maintenance' ? 'available' : 'maintenance';
  try {
    await apiAsync('PUT', '/api/units/' + encodeURIComponent(id), { status_unit: newStatus });
    toast(newStatus === 'maintenance' ? '🔧 Unit set Maintenance' : '✅ Unit diaktifkan', 'info');
    await render();
  } catch(e) { toast('❌ ' + e.message, 'error'); }
}
</script>
</body>
</html>
