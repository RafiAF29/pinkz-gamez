<!DOCTYPE html>
<html lang="id">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>Pelanggan — Pinkz Gamez Admin</title><link rel="stylesheet" href="../css/main.css"/></head>
<body>
<div id="sb-ov" class="sb-overlay"></div>
<div class="layout">
  <aside class="sidebar" id="sidebar"><div class="sb-header"><div class="sb-logo"><svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/></svg></div><div class="sb-brand">Pinkz Gamez<br>Admin</div></div><nav class="sb-nav" id="sb-nav"></nav><div class="sb-footer"><a href="login.html" onclick="doLogout()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg> Log Out</a></div></aside>
  <div class="main">
    <div class="topbar"><div class="tb-title"><h1>Pelanggan</h1><p>Data pelanggan dari booking aktif</p></div><div class="tb-right"><div class="tb-user"><span class="tb-name" id="tb-name">—</span><span class="tb-role-badge" id="tb-role-badge">Staff</span><div class="tb-avatar" id="tb-avatar">?</div></div><button class="mob-btn" id="mob-btn"><svg width="22" height="22" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg></button></div></div>
    <div class="page">
      <div class="action-bar"><div class="search-bar" style="max-width:280px"><span class="s-ico"><svg width="15" height="15" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35" stroke-linecap="round"/></svg></span><input type="text" placeholder="Cari nama / WA..." id="q" oninput="render()"/></div></div>
      <div class="tbl-wrap"><table><thead><tr><th>Nama</th><th>WhatsApp</th><th>Total Booking</th><th>Total Bayar</th><th>Terakhir Booking</th></tr></thead><tbody id="tbody"></tbody></table></div>
    </div>
  </div>
</div>
<div id="toast"></div>
<script src="../js/app.js"></script>
<script>
(async () => {
  const s=requireAdmin(); fillAdminUser(s); buildSidebar(s.role,'pelanggan.html'); initMobSidebar();
  async function render(){
    await fetchState();
    const q=document.getElementById('q').value.toLowerCase();
    const all=getAllBookings();
    // Aggregate by nama+wa
    const map={};
    all.forEach(b=>{ const k=b.wa||b.nama; if(!map[k]) map[k]={nama:b.nama,wa:b.wa||'—',count:0,total:0,last:b.tgl}; map[k].count++; if(b.payment_status==='paid') map[k].total+=b.total; if(b.tgl>map[k].last) map[k].last=b.tgl; });
    const plg=Object.values(map).filter(p=>!q||p.nama.toLowerCase().includes(q)||p.wa.includes(q));
    document.getElementById('tbody').innerHTML=plg.length?plg.map(p=>`<tr><td><b>${p.nama}</b></td><td>${p.wa}</td><td>${p.count}x</td><td>${Rp(p.total)}</td><td style="font-size:.8rem">${p.last}</td></tr>`).join(''):`<tr><td colspan="5" style="text-align:center;padding:2rem;color:var(--text3)">Tidak ada data</td></tr>`;
  }
  render();
})();
</script>
</body>
</html>
