<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Booking — Pinkz Gamez Admin</title>
  <link rel="stylesheet" href="../css/main.css"/>
  <style>
    .slot-mini{display:grid;grid-template-columns:repeat(4,1fr);gap:.3rem;max-height:240px;overflow-y:auto;padding:.2rem}
    .sm-btn{padding:.4rem .2rem;border-radius:6px;font-size:.6rem;font-weight:600;text-align:center;cursor:pointer;border:1px solid var(--border);background:var(--card2);color:var(--text2);font-family:var(--ui);transition:all .15s}
    .sm-btn.on{background:var(--pink-d);border-color:var(--pink-d);color:#fff}
    .sm-btn.bk,.sm-btn.pnd{opacity:.4;cursor:not-allowed}
    .sm-btn.bk{border-color:rgba(239,68,68,.3);color:rgba(239,68,68,.6)}
    .sm-btn.pnd{border-color:rgba(245,158,11,.3);color:rgba(245,158,11,.6)}
    .fnb-wi-grid{display:grid;grid-template-columns:1fr 1fr;gap:.35rem;max-height:180px;overflow-y:auto}
    .fnb-wi-row{display:flex;align-items:center;justify-content:space-between;padding:.45rem .55rem;background:var(--card2);border:1px solid var(--border);border-radius:var(--r);font-size:.75rem}
    .wi-qty{display:flex;align-items:center;gap:.3rem}
    .wi-qb{width:22px;height:22px;border-radius:5px;border:1px solid var(--border);background:var(--card);color:var(--text);cursor:pointer;font-size:.9rem;display:grid;place-items:center}
    .wi-qb:hover{border-color:var(--pink);color:var(--pink-l)}
    .wi-qn{font-size:.78rem;font-weight:700;min-width:15px;text-align:center}
    .wi-sum{background:rgba(236,72,153,.06);border:1px solid rgba(236,72,153,.15);border-radius:var(--r);padding:.7rem .9rem;font-size:.82rem;margin-top:.7rem}
    .wi-sr{display:flex;justify-content:space-between;padding:3px 0}
    .wi-st{display:flex;justify-content:space-between;padding:7px 0 0;border-top:1px solid rgba(236,72,153,.2);font-weight:700;margin-top:4px}
  </style>
</head>
<body>
<div id="sb-ov" class="sb-overlay"></div>
<div class="layout">
  <aside class="sidebar" id="sidebar">
    <div class="sb-header"><div class="sb-logo"><svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/></svg></div><div class="sb-brand">Pinkz Gamez<br>Admin</div></div>
    <nav class="sb-nav" id="sb-nav"></nav>
    <div class="sb-footer"><a href="login.html" onclick="doLogout()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg> Log Out</a></div>
  </aside>
  <div class="main">
    <div class="topbar">
      <div class="tb-title"><h1>Booking</h1><p>Semua booking online &amp; walk-in</p></div>
      <div class="tb-right"><div class="tb-user"><span class="tb-name" id="tb-name">—</span><span class="tb-role-badge" id="tb-role-badge">Staff</span><div class="tb-avatar" id="tb-avatar">?</div></div><button class="mob-btn" id="mob-btn"><svg width="22" height="22" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg></button>
      <button class="btn btn-primary btn-sm btn-pill" onclick="openWI()">+ Walk-in</button></div>
    </div>
    <div class="page">
      <div class="action-bar"><div class="search-bar" style="max-width:280px"><span class="s-ico"><svg width="15" height="15" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35" stroke-linecap="round"/></svg></span><input type="text" placeholder="Cari nama / ID..." id="q" oninput="render()"/></div></div>
      <div class="filter-tabs">
        <button class="ftab on" onclick="setF(this,'all')">Semua</button>
        <button class="ftab" onclick="setF(this,'pending')">⏳ Pending</button>
        <button class="ftab" onclick="setF(this,'paid')">✅ Paid</button>
        <button class="ftab" onclick="setF(this,'rejected')">❌ Rejected</button>
      </div>
      <div class="tbl-wrap">
        <table><thead><tr><th>ID</th><th>Tipe</th><th>Pelanggan</th><th>Unit</th><th>Waktu</th><th>F&amp;B</th><th>Total</th><th>Status</th><th>Aksi</th></tr></thead>
        <tbody id="tbody"></tbody></table>
      </div>
    </div>
  </div>
</div>

<!-- WALK-IN MODAL -->
<div class="modal-bg" id="m-wi">
  <div class="modal" style="max-width:680px;max-height:94vh;overflow-y:auto">
    <button class="modal-x" onclick="closeM('m-wi')">✕</button>
    <div class="modal-title">🚶 Walk-in Booking</div>
    <div class="row2">
      <div class="fg"><label>Nama Pelanggan</label><input id="wi-nama" placeholder="Nama..."/></div>
      <div class="fg"><label>No. WhatsApp</label><input id="wi-wa" placeholder="08xxxxxxxxxx"/></div>
    </div>
    <div class="row2">
      <div class="fg"><label>Unit</label>
        <select id="wi-unit" onchange="wiUnitChg()"><option value="">-- Pilih Unit --</option></select>
      </div>
      <div class="fg"><label>Tanggal</label><input type="date" id="wi-tgl" onchange="wiRenderSlots()"/></div>
    </div>
    <div id="wi-udesc" style="display:none;font-size:.74rem;color:var(--text2);margin-bottom:.7rem;padding:.5rem;background:rgba(236,72,153,.05);border-radius:var(--r)"></div>
    <div class="fg">
      <label>Sesi <span style="font-size:.7rem;color:var(--text3);font-weight:400">(klik untuk pilih, harus berurutan)</span></label>
      <div class="slot-mini" id="wi-slots"><div style="grid-column:1/-1;text-align:center;padding:.6rem;color:var(--text3);font-size:.76rem">Pilih unit &amp; tanggal dulu</div></div>
    </div>
    <div class="fg">
      <label>Makanan &amp; Minuman <span style="font-size:.7rem;color:var(--text3);font-weight:400">(opsional)</span></label>
      <div style="display:flex;gap:.3rem;flex-wrap:wrap;margin:.4rem 0">
        <button class="fnb-tab on" onclick="wiSFnb('Semua',this)">Semua</button>
        <button class="fnb-tab" onclick="wiSFnb('Makanan',this)">🍜</button>
        <button class="fnb-tab" onclick="wiSFnb('Minuman',this)">🥤</button>
        <button class="fnb-tab" onclick="wiSFnb('Cemilan',this)">🍪</button>
      </div>
      <div class="fnb-wi-grid" id="wi-fnb"></div>
    </div>
    <div class="fg"><label>Metode Bayar</label>
      <select id="wi-met"><option>Cash</option><option>QRIS</option><option>Transfer Bank</option><option>E-Wallet</option></select>
    </div>
    <div class="wi-sum" id="wi-sum" style="display:none">
      <div class="wi-sr"><span style="color:var(--text2)">Unit</span><span id="wis-u">—</span></div>
      <div class="wi-sr"><span style="color:var(--text2)">Waktu</span><span id="wis-t">—</span></div>
      <div class="wi-sr"><span style="color:var(--text2)">Sewa</span><span id="wis-p">—</span></div>
      <div class="wi-sr" id="wis-fr" style="display:none"><span style="color:var(--text2)">F&amp;B</span><span id="wis-f">—</span></div>
      <div class="wi-st"><span>TOTAL</span><span id="wis-tot" style="color:var(--pink-l)">—</span></div>
    </div>
    <button class="btn btn-primary btn-full" style="margin-top:1rem" onclick="submitWI()">✅ Simpan &amp; Konfirmasi</button>
  </div>
</div>

<div class="modal-bg" id="m-struk">
  <div class="modal" style="max-width:360px">
    <button class="modal-x" onclick="closeM('m-struk')">✕</button>
    <div class="modal-title">🖨️ Struk</div>
    <pre id="struk-c" style="background:#fff;color:#111;padding:1rem;border-radius:var(--r);font-family:monospace;font-size:.72rem;line-height:1.8;white-space:pre-wrap"></pre>
    <div style="display:flex;gap:.6rem;margin-top:.8rem">
      <button class="btn btn-ghost" style="flex:1" onclick="window.print()">Cetak</button>
      <button class="btn btn-primary" style="flex:1" onclick="closeM('m-struk')">Tutup</button>
    </div>
  </div>
</div>

<div id="toast"></div>
<script src="../js/app.js"></script>
<script>
(async () => {
  const s=requireAdmin(); fillAdminUser(s); buildSidebar(s.role,'booking.html'); initMobSidebar();
  const MON=['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];
  let filt='all', wiSS=[], wiFnbC={}, wiFnbCat='Semua';

  function setF(el,f){ document.querySelectorAll('.ftab').forEach(t=>t.classList.remove('on')); el.classList.add('on'); filt=f; render(); }
  async function render(){
    await fetchState();
    const q=document.getElementById('q').value.toLowerCase();
    const all=getAllBookings().filter(b=>(filt==='all'||b.payment_status===filt)&&(!q||b.nama?.toLowerCase().includes(q)||b.id?.toLowerCase().includes(q)));
    const CLS={'pending':'badge-yellow','paid':'badge-green','rejected':'badge-red'};
    const LBL={'pending':'⏳ Pending','paid':'✅ Paid','rejected':'❌ Rejected'};
    document.getElementById('tbody').innerHTML=all.length?all.map(b=>`
      <tr>
        <td style="font-size:.76rem"><b>${esc(b.id)}</b></td>
        <td>${b.tipe_booking==='online'?'<span class="badge badge-purple" style="font-size:.58rem">🌐 Online</span>':'<span class="badge badge-blue" style="font-size:.58rem">🚶 Walk-in</span>'}</td>
        <td style="font-size:.84rem">${esc(b.nama)}<br><span style="font-size:.68rem;color:var(--text3)">${esc(b.wa)}</span></td>
        <td style="font-size:.78rem">${b.unitNama||'—'}</td>
        <td style="font-size:.72rem">${esc(b.tglStr||b.tgl)}<br>${b.timeRange||'—'} (${b.dur}j)</td>
        <td style="font-size:.72rem">${b.fnb&&b.fnb.length?b.fnb.map(f=>f.ico+' '+f.nama+'×'+f.qty).join('<br>'):'—'}</td>
        <td><b style="font-size:.84rem">${Rp(b.total)}</b></td>
        <td><span class="badge ${CLS[b.payment_status]||'badge-yellow'}">${LBL[b.payment_status]||'—'}</span></td>
        <td style="display:flex;gap:4px;flex-wrap:wrap">
          ${b.payment_status==='pending'?`<a href="pembayaran.html" class="btn btn-success btn-sm">✓</a>`:''}
          ${b.payment_status==='paid'&&b.struk?`<button class="btn btn-ghost btn-sm" onclick="prt('${esc(b.id)}')">🖨</button>`:''}
        </td>
      </tr>`).join(''):`<tr><td colspan="9" style="text-align:center;padding:2rem;color:var(--text3)">Tidak ada booking</td></tr>`;
  }

  function openWI(){
    wiSS=[]; wiFnbC={};
    const sel=document.getElementById('wi-unit');
    const wiTgl=document.getElementById('wi-tgl').value||today(); sel.innerHTML='<option value="">-- Pilih Unit --</option>'+getUnits().filter(u=>u.status_unit==='available').map(u=>`<option value="${u.id}">${u.nama} — ${Rp(getHarga(u,wiTgl))}/jam</option>`).join('');
    document.getElementById('wi-tgl').value=today();
    document.getElementById('wi-udesc').style.display='none';
    document.getElementById('wi-sum').style.display='none';
    document.getElementById('wi-slots').innerHTML='<div style="grid-column:1/-1;text-align:center;padding:.6rem;color:var(--text3);font-size:.76rem">Pilih unit &amp; tanggal dulu</div>';
    wiFnbCat='Semua'; document.querySelectorAll('#m-wi .fnb-tab').forEach((t,i)=>{ t.className='fnb-tab'+(i===0?' on':''); });
    wiRenderFnb(); openM('m-wi');
  }

  function wiUnitChg(){
    const uid=document.getElementById('wi-unit').value;
    const desc=document.getElementById('wi-udesc');
    if(!uid){ desc.style.display='none'; wiSS=[]; wiRenderSlots(); wiUpdSum(); return; }
    const u=getUnits().find(x=>x.id===uid);
    if(u){ const meta=UNIT_META[u.kategori]||{}; desc.textContent=`${u.nama} — ${meta.desc||''}`; desc.style.display='block'; }
    wiSS=[]; wiRenderSlots(); wiUpdSum();
  }

  function wiRenderSlots(){
    const uid=document.getElementById('wi-unit').value, tgl=document.getElementById('wi-tgl').value;
    const g=document.getElementById('wi-slots');
    if(!uid||!tgl){ g.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:.6rem;color:var(--text3);font-size:.76rem">Pilih unit &amp; tanggal dulu</div>'; return; }
    g.innerHTML=''; const frag=document.createDocumentFragment();
    ALL_SLOTS.forEach(slot=>{
      const bk=isSlotBooked(uid,tgl,slot), pend=isSlotPending(uid,tgl,slot), on=wiSS.includes(slot);
      const btn=document.createElement('button');
      btn.className='sm-btn'+(on?' on':bk?' bk':pend?' pnd':'');
      btn.textContent=slot;
      if(bk||pend){ btn.disabled=true; }
      else { btn.onclick=()=>wiTS(slot); }
      frag.appendChild(btn);
    }); g.appendChild(frag);
  }

  function wiTS(slot){
    const uid=document.getElementById('wi-unit').value, tgl=document.getElementById('wi-tgl').value;
    if(!uid||!tgl||isSlotBooked(uid,tgl,slot)||isSlotPending(uid,tgl,slot)) return;
    const idx=wiSS.indexOf(slot);
    if(idx===-1){
      if(wiSS.length===0) wiSS.push(slot);
      else{ const ai=ALL_SLOTS.indexOf(slot),ix=wiSS.map(s=>ALL_SLOTS.indexOf(s)).sort((a,b)=>a-b); if(ai===ix[0]-1||ai===ix[ix.length-1]+1) wiSS.push(slot); else{ toast('⚠️ Pilih sesi berurutan!'); return; } }
    } else {
      const ai=ALL_SLOTS.indexOf(slot),ix=wiSS.map(s=>ALL_SLOTS.indexOf(s)).sort((a,b)=>a-b);
      if(ai===ix[0]||ai===ix[ix.length-1]) wiSS.splice(idx,1); else{ toast('⚠️ Hapus dari ujung!'); return; }
    }
    wiRenderSlots(); wiUpdSum();
  }

  function wiSFnb(cat,el){ wiFnbCat=cat; document.querySelectorAll('#m-wi .fnb-tab').forEach(t=>t.classList.remove('on')); el.classList.add('on'); wiRenderFnb(); }
  function wiRenderFnb(){
    const menu=getMenu().filter(m=>m.aktif&&(wiFnbCat==='Semua'||m.kategori===wiFnbCat));
    document.getElementById('wi-fnb').innerHTML=menu.map(m=>{
      const q=wiFnbC[m.id]||0;
      return `<div class="fnb-wi-row"><span>${m.ico||''} ${m.nama}<br><span style="color:var(--pink-l);font-size:.65rem">${Rp(m.harga)}</span></span>
        <div class="wi-qty"><button class="wi-qb" onclick="wiQ('${m.id}',-1)">−</button><div class="wi-qn" id="wiq-${m.id}">${q}</div><button class="wi-qb" onclick="wiQ('${m.id}',1)">+</button></div></div>`;
    }).join('');
  }
  function wiQ(id,delta){ const it=getMenu().find(m=>m.id===id); if(!it) return; const nv=Math.max(0,(wiFnbC[id]||0)+delta); if(delta>0&&nv>it.stok){ toast('Stok habis'); return; } if(nv===0) delete wiFnbC[id]; else wiFnbC[id]=nv; const el=document.getElementById('wiq-'+id); if(el) el.textContent=nv; wiUpdSum(); }

  function wiUpdSum(){
    const uid=document.getElementById('wi-unit').value, tgl=document.getElementById('wi-tgl').value;
    if(!uid||!tgl||wiSS.length===0){ document.getElementById('wi-sum').style.display='none'; return; }
    const u=getUnits().find(x=>x.id===uid); if(!u) return;
    const sorted=[...wiSS].sort((a,b)=>ALL_SLOTS.indexOf(a)-ALL_SLOTS.indexOf(b));
    const sewa=hitungSewa(u,tgl,sorted.length);
    const tR=sorted.length===1?sorted[0]:`${sorted[0].split('–')[0]}–${sorted[sorted.length-1].split('–')[1]}`;
    const menu=getMenu(); let tfnb=0;
    Object.entries(wiFnbC).forEach(([id,q])=>{ const it=menu.find(m=>m.id===id); if(it&&q>0) tfnb+=it.harga*q; });
    document.getElementById('wis-u').textContent=u.nama+(sewa.isWeekend?' 🟡 Weekend':' 🔵 Weekday');
    document.getElementById('wis-t').textContent=tR+(sewa.bonusJam>0?' (+'+sewa.bonusJam+'j bonus)':'');
    document.getElementById('wis-p').textContent=Rp(sewa.total)+' ('+sewa.jamBayar+' jam × '+Rp(sewa.harga)+')';
    document.getElementById('wis-tot').textContent=Rp(sewa.total+tfnb);
    if(tfnb>0){ document.getElementById('wis-fr').style.display='flex'; document.getElementById('wis-f').textContent=Rp(tfnb); } else document.getElementById('wis-fr').style.display='none';
    document.getElementById('wi-sum').style.display='block';
  }

  function submitWI(){
    const nama=document.getElementById('wi-nama').value.trim(), wa=document.getElementById('wi-wa').value.trim();
    const uid=document.getElementById('wi-unit').value, tgl=document.getElementById('wi-tgl').value;
    const met=document.getElementById('wi-met').value;
    if(!nama||!wa){ toast('❌ Isi nama & WA!'); return; }
    if(!uid){ toast('❌ Pilih unit!'); return; }
    if(!tgl){ toast('❌ Pilih tanggal!'); return; }
    if(wiSS.length===0){ toast('❌ Pilih sesi!'); return; }
    const u=getUnits().find(x=>x.id===uid);
    const sorted=[...wiSS].sort((a,b)=>ALL_SLOTS.indexOf(a)-ALL_SLOTS.indexOf(b));
    const dur=sorted.length, tps=u.harga*dur;
    const tR=dur===1?sorted[0]:`${sorted[0].split('–')[0]}–${sorted[dur-1].split('–')[1]}`;
    const d=new Date(tgl+'T00:00:00'), tglStr=`${d.getDate()} ${MON[d.getMonth()]} ${d.getFullYear()}`;
    const menu=getMenu(); let tfnb=0; const fi=[];
    Object.entries(wiFnbC).forEach(([id,q])=>{ const it=menu.find(m=>m.id===id); if(it&&q>0){ tfnb+=it.harga*q; fi.push({id:it.id,nama:it.nama,ico:it.ico||'',harga:it.harga,qty:q}); } });
    const sewa=hitungSewa(u,tgl,sorted.length);
    const bk={ id:'WI-'+Date.now(), unitId:uid, unitNama:u.nama, kategori:u.kategori, tgl, tglStr, slots:sorted, timeRange:tR, dur:sewa.jamBayar, jamMain:sewa.jamMain, bonusJam:sewa.bonusJam, isWeekend:sewa.isWeekend, nama, wa, catatan:'', metode:met, fnb:fi, total_ps:sewa.total, total_fnb:tfnb, total:sewa.total+tfnb, payment_status:'pending', booking_status:'pending', tipe_booking:'walkin', created_at:new Date().toISOString() };
    const saved = API_ENABLED ? addBookingToStore(bk) : (markSlotPending(uid,tgl,sorted), addBookingToStore(bk));
    if(!saved) return;
    adminAccPayment(bk.id);
    closeM('m-wi'); toast('✅ Walk-in '+bk.id+' dikonfirmasi!'); render();
  }

  function prt(id){ const b=getBookingById(id); if(!b||!b.struk){ toast('Struk belum ada'); return; } document.getElementById('struk-c').textContent=b.struk; openM('m-struk'); }

  setInterval(render,5000); render();
})();
</script>
</body>
</html>
